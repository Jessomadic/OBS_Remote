name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installer on Windows
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Read version from version.py
      # -----------------------------------------------------------------------
      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "exec(open('version.py').read()); print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # -----------------------------------------------------------------------
      # 4. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # -----------------------------------------------------------------------
      # 5. Generate icon if not present (using Pillow)
      # -----------------------------------------------------------------------
      - name: Generate icon
        shell: python
        run: |
          from pathlib import Path
          from PIL import Image, ImageDraw

          path = Path("assets/icon.ico")
          path.parent.mkdir(exist_ok=True)
          if path.exists():
              exit(0)

          sizes = [16, 32,48, 64, 128, 256]
          images = []
          for size in sizes:
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              m = max(1, size // 16)
              draw.ellipse([m, m, size - m, size - m], fill="#7C3AED")
              c = size // 2
              r = max(2, size // 6)
              draw.ellipse([c - r, c - r, c + r, c + r], fill="white")
              images.append(img)
          images[0].save(str(path), format="ICO", sizes=[(s, s) for s in sizes],
                         append_images=images[1:])
          print(f"Generated {path}")

      # -----------------------------------------------------------------------
      # 6. PyInstaller — build the exe bundle
      # -----------------------------------------------------------------------
      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm --clean

      # -----------------------------------------------------------------------
      # 7. Install Inno Setup
      # -----------------------------------------------------------------------
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y

      # -----------------------------------------------------------------------
      # 8. Patch version in installer script
      # -----------------------------------------------------------------------
      - name: Patch version in setup.iss
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/#define MyAppVersion \".*\"/#define MyAppVersion \"$VERSION\"/" installer/setup.iss

      # -----------------------------------------------------------------------
      # 9. Build the Inno Setup installer
      # -----------------------------------------------------------------------
      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      # -----------------------------------------------------------------------
      # 10. Verify output
      # -----------------------------------------------------------------------
      - name: List dist output
        shell: bash
        run: ls -lh dist/*.exe

      # -----------------------------------------------------------------------
      # 11. Create GitHub Release and upload installer
      # -----------------------------------------------------------------------
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OBS Remote ${{ steps.version.outputs.tag }}
          body: |
            ## OBS Remote ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `OBSRemote_Setup_${{ steps.version.outputs.version }}.exe`
            2. Run as Administrator
            3. The installer will:
               - Install OBS Remote to `Program Files\OBSRemote`
               - Register and start a Windows service
               - Optionally add a tray icon to Windows startup
            4. Open your browser to `http://localhost:42069`

            ### Requirements
            - Windows 10 / 11 (64-bit)
            - OBS Studio 28+ with WebSocket server enabled
              (Tools → WebSocket Server Settings → Enable WebSocket server)

            ### Changes
            Built from commit ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist/OBSRemote_Setup_${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
