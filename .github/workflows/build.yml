name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installer on Windows
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Read version from version.py
      # -----------------------------------------------------------------------
      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "exec(open('version.py').read()); print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 3. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # -----------------------------------------------------------------------
      # 4. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # -----------------------------------------------------------------------
      # 5. Generate icon if not present (using Pillow)
      # -----------------------------------------------------------------------
      - name: Generate icon
        shell: python
        run: |
          from pathlib import Path
          from PIL import Image, ImageDraw

          def make_frame(size):
              img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              s = size / 32.0
              draw.rounded_rectangle([0, 0, size-1, size-1], radius=max(1, round(7*s)), fill="#7C3AED")
              cx, cy = size/2, size/2
              cr = 7 * s
              sw = max(1, round(2*s))
              draw.ellipse([cx-cr, cy-cr, cx+cr, cy+cr], outline="white", width=sw)
              dr = max(1, round(2.5*s))
              draw.ellipse([cx-dr, cy-dr, cx+dr, cy+dr], fill="white")
              lw = max(1, round(2*s))
              cap = lw / 2
              for (x1,y1),(x2,y2) in [((16*s,5*s),(16*s,10*s)),((16*s,22*s),(16*s,27*s)),
                                       ((5*s,16*s),(10*s,16*s)),((22*s,16*s),(27*s,16*s))]:
                  draw.line([(x1,y1),(x2,y2)], fill="white", width=lw)
                  for px,py in [(x1,y1),(x2,y2)]:
                      draw.ellipse([px-cap,py-cap,px+cap,py+cap], fill="white")
              return img

          path = Path("assets/icon.ico")
          path.parent.mkdir(exist_ok=True)
          base = make_frame(256)
          base.save(str(path), format="ICO", sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print(f"Generated {path} ({path.stat().st_size} bytes)")

      # -----------------------------------------------------------------------
      # 6. PyInstaller — build the exe bundle
      # -----------------------------------------------------------------------
      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm --clean

      # -----------------------------------------------------------------------
      # 7. Install Inno Setup
      # -----------------------------------------------------------------------
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y

      # -----------------------------------------------------------------------
      # 8. Patch version in installer script
      # -----------------------------------------------------------------------
      - name: Patch version in setup.iss
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/#define MyAppVersion \".*\"/#define MyAppVersion \"$VERSION\"/" installer/setup.iss

      # -----------------------------------------------------------------------
      # 9. Build the Inno Setup installer
      # -----------------------------------------------------------------------
      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      # -----------------------------------------------------------------------
      # 10. Verify output
      # -----------------------------------------------------------------------
      - name: List dist output
        shell: bash
        run: ls -lh dist/*.exe

      # -----------------------------------------------------------------------
      # 11. Create GitHub Release and upload installer
      # -----------------------------------------------------------------------
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OBS Remote ${{ steps.version.outputs.tag }}
          body: |
            ## OBS Remote ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `OBSRemote_Setup_${{ steps.version.outputs.version }}.exe`
            2. Run as Administrator
            3. The installer will:
               - Install OBS Remote to `Program Files\OBSRemote`
               - Register and start a Windows service
               - Optionally add a tray icon to Windows startup
            4. Open your browser to `http://localhost:42069`

            ### Requirements
            - Windows 10 / 11 (64-bit)
            - OBS Studio 28+ with WebSocket server enabled
              (Tools → WebSocket Server Settings → Enable WebSocket server)

            ### Changes
            Built from commit ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist/OBSRemote_Setup_${{ steps.version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
